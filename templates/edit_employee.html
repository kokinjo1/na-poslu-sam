<!DOCTYPE html>
<html>
    <head>
        <title>Na poslu sam - Zaposleni</title>
    </head>
    <body>
        <form action="{{ url_for('admin_employees_edit', employee_id=employee[0]) }}" method="POST">
            <label>Ime i prezime:</label><input type="text" name="name" value="{{ employee[1] }}">
            <label>Organizaciona jedinica:</label><input type="text" name="department" value="{{ employee[2] }}">
            <label>Pozicija:</label><input type="text" name="position" value="{{ employee[3] }}">
            <label>PIN:</label><input type="text" name="pin" value="{{ employee[4] }}">
            <button type="submit">Sačuvaj promene</button>
            <a href="{{ url_for('admin_employees') }}">Otkaži</a>
        </form>
    </body>
</html>
